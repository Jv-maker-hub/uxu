<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO × UNO — Sistema de Identidad Visual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .h-brand { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #777; font-weight: 500; }
    .h-title { font-size: 11px; letter-spacing: 0.08em; color: #555; }
    .h-counter { font-size: 11px; color: #444; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

    /* ── VIEWER ── */
    .viewer {
      position: fixed; top: 48px; bottom: 44px; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 20px 64px;
    }

    .slides-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

    .slide { display: none; width: 100%; height: 100%; }
    .slide.active { display: flex; align-items: center; justify-content: center; }
    .slide img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      display: block;
      box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    }

    /* ── NAV ARROWS ── */
    .btn-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      z-index: 10;
    }
    .btn-nav:hover:not(:disabled) { background: rgba(255,255,255,0.14); }
    .btn-nav:disabled { opacity: 0.15; cursor: default; }
    .btn-prev { left: 12px; }
    .btn-next { right: 12px; }

    /* ── FOOTER / DOTS ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid #222;
      display: flex; align-items: center; justify-content: center;
      gap: 5px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #333; border: none; cursor: pointer;
      padding: 0; transition: background 0.15s, transform 0.15s;
    }
    .dot:hover { background: #666; }
    .dot.active { background: #aaa; transform: scale(1.3); }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed; top: 0; left: 0;
      height: 48px; padding: 0 16px;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: #555;
      font-size: 11px; letter-spacing: 0.1em;
      transition: color 0.15s;
      z-index: 200;
    }
    .back-link:hover { color: #aaa; }

    /* ── FULLSCREEN BTN ── */
    .btn-fs {
      position: fixed; top: 0; right: 0;
      height: 48px; padding: 0 16px;
      display: flex; align-items: center;
      background: none; border: none; cursor: pointer; color: #444;
      transition: color 0.15s; z-index: 200;
    }
    .btn-fs:hover { color: #aaa; }

    /* ── KEYBOARD HINT ── */
    .hint {
      position: fixed; bottom: 52px; right: 16px;
      font-size: 10px; color: #333; letter-spacing: 0.06em;
      pointer-events: none;
    }
  </style>
</head>
<body>

<a class="back-link" href="/">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
  INICIO
</a>

<header>
  <span class="h-brand">UNO × UNO</span>
  <span class="h-title">Sistema de Identidad Visual · 2026</span>
  <span class="h-counter" id="counter">1 / 37</span>
</header>

<div class="viewer">
  <button class="btn-nav btn-prev" id="prev" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
  </button>
  <div class="slides-wrap" id="slides"></div>
  <button class="btn-nav btn-next" id="next">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,6 15,12 9,18"/></svg>
  </button>
</div>

<footer id="dots"></footer>

<button class="btn-fs" id="fsBtn" title="Pantalla completa">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
</button>

<span class="hint">← → navegar · F pantalla completa</span>

<script>
  const TOTAL = 37;
  let current = 0;

  const slidesEl = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const counter = document.getElementById('counter');

  // Build slides
  for (let i = 1; i <= TOTAL; i++) {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 1 ? ' active' : '');
    div.id = 's' + i;
    const img = document.createElement('img');
    img.src = `manual-pages/page_${String(i).padStart(2,'0')}.jpg`;
    img.alt = 'Página ' + i;
    // Preload next page
    if (i === 1) {
      const preload = new Image();
      preload.src = `manual-pages/page_02.jpg`;
    }
    div.appendChild(img);
    slidesEl.appendChild(div);
  }

  // Build dots
  for (let i = 0; i < TOTAL; i++) {
    const btn = document.createElement('button');
    btn.className = 'dot' + (i === 0 ? ' active' : '');
    btn.title = 'Página ' + (i + 1);
    btn.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(btn);
  }

  function goTo(n) {
    if (n < 0 || n >= TOTAL) return;
    document.getElementById('s' + (current + 1)).classList.remove('active');
    dotsEl.children[current].classList.remove('active');
    current = n;
    const slide = document.getElementById('s' + (current + 1));
    slide.classList.add('active');
    dotsEl.children[current].classList.add('active');
    counter.textContent = (current + 1) + ' / ' + TOTAL;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === TOTAL - 1;
    // Preload adjacent
    const preNext = new Image();
    preNext.src = `manual-pages/page_${String(current + 2).padStart(2,'0')}.jpg`;
    const prePrev = new Image();
    prePrev.src = `manual-pages/page_${String(current).padStart(2,'0')}.jpg`;
    // Scroll dot into view
    dotsEl.children[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
    if (e.key === 'f' || e.key === 'F') toggleFS();
    if (e.key === 'Home') goTo(0);
    if (e.key === 'End') goTo(TOTAL - 1);
  });

  // Touch swipe
  let touchX = null;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
    touchX = null;
  }, { passive: true });

  // Fullscreen
  function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
  document.getElementById('fsBtn').addEventListener('click', toggleFS);
</script>

</body>
</html>
