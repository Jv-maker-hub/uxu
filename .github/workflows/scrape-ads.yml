name: Scraper de ads competidores

on:
  schedule:
    - cron: '0 12 * * *'  # 9am Argentina (UTC-3)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no escribe en DB)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node index.js --dry-run
          else
            node index.js
          fi
